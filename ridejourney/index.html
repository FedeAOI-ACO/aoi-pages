<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Bike Journey — AOI Travels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #e8dcc8;
    }

    a.map-link {
      display: block;
      width: 100%;
      height: 100%;
      position: relative;
      cursor: pointer;
      text-decoration: none;
    }

    img.map-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
      display: block;
    }

    .hint {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3b2a1a;
      opacity: 0;
      pointer-events: none;
      animation: fadeInPulse 3s ease 2s infinite;
    }

    @keyframes fadeInPulse {
      0%   { opacity: 0; }
      20%  { opacity: 0.7; }
      60%  { opacity: 0.7; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <a class="map-link" href="journey.html">
    <img class="map-img" src="images/maparide.png" alt="Mapa del recorrido — Japan Bike Journey">
  </a>

  <span class="hint">Click para continuar</span>

</body>
</html>
