<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Alpine Journey — AOI Travels</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8dcc8;
      position: relative;
      overflow: hidden;
    }
    .map-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .map-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
    }
    .map-placeholder {
      color: rgba(255,255,255,0.08);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .cta {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 0.8s forwards;
    }
    .cta a {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #3b2a1a;
      background: transparent;
      padding: 16px 48px;
      text-decoration: none;
      transition: all 0.4s;
      border: 1.5px solid #3b2a1a;
    }
    .cta a:hover {
      background: #3b2a1a;
      color: #e8dcc8;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(12px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="map-wrap">
    <!-- Replace with: <img src="images/map.jpg" alt="Mapa del recorrido"> -->
    <img src="images/maphikejapan.png" alt="Mapa del recorrido">
  </div>
  <div class="cta">
    <a href="journey.html">Descubre el Recorrido</a>
  </div>
</body>
</html>
