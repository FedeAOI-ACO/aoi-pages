<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Alpine Journey — AOI Travels</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #2c3a2e;
    }

    /* journey.html cargada por debajo */
    #journey-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 0;
    }

    /* Overlay del mapa encima */
    #map-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: #e8dcc8;
      cursor: pointer;
      transition: opacity 4.8s ease;
    }

    #map-overlay img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
      display: block;
    }

    #hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3b2a1a;
      opacity: 0;
      animation: hintAppear 1s ease 2s forwards, hintPulse 2.5s ease 3s infinite;
      white-space: nowrap;
      pointer-events: none;
    }

    @keyframes hintAppear {
      from { opacity: 0; }
      to   { opacity: 0.55; }
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 0.2; }
    }
  </style>
</head>
<body>

  <!-- Landing cargado por debajo -->
  <iframe id="journey-frame" src="journey.html" title="Japan Alpine Journey"></iframe>

  <!-- Overlay del mapa -->
  <div id="map-overlay">
    <img src="images/maphikejapan.png" alt="Mapa del recorrido">
    <span id="hint">Click para continuar</span>
  </div>

  <script>
    const overlay = document.getElementById('map-overlay');
    let faded = false;

    function triggerFade() {
      if (faded) return;
      faded = true;

      overlay.style.opacity = '0';

      setTimeout(() => {
        overlay.remove();
      }, 5200);
    }

    // Click activa el fade
    overlay.addEventListener('click', triggerFade);

    // Auto-fade a los 4.5 segundos
    setTimeout(triggerFade, 4500);
  </script>

</body>
</html>
