<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japón por primera vez — AOI Travels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #e8dcc8;
  }

  /* iframe debajo — z-index 0 */
  .journey-frame {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 0;
  }

  /* overlay del mapa encima — z-index 10 */
  .map-overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    cursor: pointer;
    opacity: 1;
    transition: opacity 4.8s ease;
  }
  .map-overlay.fading { opacity: 0; }

  .map-overlay img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 40%;
    display: block;
  }

  .hint {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: #3b2a1a;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0;
    animation: hintAppear 0.6s ease 2s forwards;
    pointer-events: none;
    white-space: nowrap;
    z-index: 11;
    transition: opacity 4.8s ease;
  }
  .hint.fading { opacity: 0 !important; animation: none; }

  @keyframes hintAppear {
    to { opacity: 1; animation-name: hintPulse; animation-duration: 2s; animation-iteration-count: infinite; animation-timing-function: ease-in-out; }
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }
</style>
</head>
<body>

<iframe class="journey-frame" src="/primvez/journey.html"></iframe>

<div class="map-overlay" id="mapOverlay">
  <img src="/primvez/images/mapa1vez.png" alt="Ruta — Japón por primera vez">
</div>

<p class="hint" id="hint">Click para continuar</p>

<script>
  const overlay = document.getElementById('mapOverlay');
  const hint = document.getElementById('hint');
  let faded = false;

  function triggerFade() {
    if (faded) return;
    faded = true;
    overlay.classList.add('fading');
    hint.classList.add('fading');
    setTimeout(() => {
      overlay.remove();
      hint.remove();
    }, 5200);
  }

  // Click dispara fade
  overlay.addEventListener('click', triggerFade);

  // Auto-fade a los 4.5s
  setTimeout(triggerFade, 4500);
</script>

</body>
</html>
