<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japón por primera vez — AOI Travels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #e8dcc8;
  }

  .map-link {
    display: block;
    width: 100%;
    height: 100vh;
    position: relative;
    cursor: pointer;
    text-decoration: none;
  }

  .map-link img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 40%;
    display: block;
  }

  .hint {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: #3b2a1a;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0;
    animation: hintAppear 0.6s ease 2s forwards;
    pointer-events: none;
    white-space: nowrap;
  }

  @keyframes hintAppear {
    to { opacity: 1; animation-name: hintPulse; animation-duration: 2s; animation-iteration-count: infinite; animation-timing-function: ease-in-out; }
  }

  @keyframes hintPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }
</style>
</head>
<body>

<a class="map-link" href="/primvez/journey.html">
  <img src="/primvez/images/mapa1vez.png" alt="Ruta — Japón por primera vez">
</a>

<p class="hint">Click para continuar</p>

</body>
</html>
