<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOI · Japan Golf & Cultural Journey</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #e8dcc8; }
  a.map-link {
    display: block;
    width: 100%;
    height: 100vh;
    cursor: pointer;
  }
  a.map-link img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 40%;
    display: block;
  }
  .hint {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: #3b2a1a;
    letter-spacing: 0.15em;
    opacity: 0;
    animation: hintAppear 0.8s ease 2s forwards, hintPulse 2.5s ease-in-out 2.8s infinite;
    pointer-events: none;
    z-index: 10;
  }
  @keyframes hintAppear {
    from { opacity: 0; transform: translateX(-50%) translateY(6px); }
    to { opacity: 0.6; transform: translateX(-50%) translateY(0); }
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 0.25; }
  }
</style>
</head>
<body>
<a class="map-link" href="journey.html">
  <img src="./images/mapagolf.png" alt="Japan Golf Journey Map">
</a>
<div class="hint">Click para continuar</div>
</body>
</html>
